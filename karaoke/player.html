<html lang="en">
<head>

  })(window,document,'script','dataLayer','GTM-KJZPQKBM');</script>

  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Karaoke Player – Route Vocals, Band & Lyrics</title>

  <!-- site styles -->
  <link rel="stylesheet" href="https://www.krishposa.com/assets/css/styles.css">
  <link rel="stylesheet" href="https://www.krishposa.com/assets/css/karaoke.css">
<link rel="stylesheet" href="https://www.krishposa.com/assets/css/dark-surface.css">

  <!-- API endpoints -->
  <meta name="karaoke-list" content="https://karaoke-func-bthmcvafagcncmck.canadacentral-01.azurewebsites.net/api/list?code=">
</head>
<body  class="dark-surface">
<noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-KJZPQKBM" height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>

<div id="header"></div>
<script defer src="https://www.krishposa.com/assets/js/header.js?v=final1"></script>

<main class="container">

  <!-- Song picker -->
  <section class="card">
    <h1>Karaoke Player</h1>
    <p class="help">Choose a processed song from storage. We’ll auto-load secure (SAS) links for vocals & band.</p>

    <div class="grid-2">
      <div class="field">
        <label for="songPick">Song</label>
        <select id="songPick">
          <option value="">Loading…</option>
        </select>
      </div>
      <div class="field">
        <label>&nbsp;</label>
        <button id="useSelection" class="btn btn-blue" type="button">Load selection</button>
      </div>
    </div>

    <div class="row" style="margin-top:.5rem">
      <button id="refreshList" class="btn btn-outline" type="button">Refresh list</button>
    </div>

    <!-- Now Playing display -->
    <div class="now-playing" style="margin-top:.75rem">
      <strong>Now Playing:</strong> <span id="trackTitle">—</span>
    </div>

    <div id="listStatus" class="help" aria-live="polite"></div>
  </section>

  <!-- Route outputs -->
  <section class="card">
    <h2>Route outputs</h2>
    <p class="help">Click “Enable device list” first (Chrome/Edge desktop) to pick Bluetooth or other outputs.</p>

    <div class="grid-2">
      <div class="field">
        <label for="vocalsOut">Vocals output</label>
        <select id="vocalsOut"></select>
      </div>
      <div class="field">
        <label for="bandOut">Band output</label>
        <select id="bandOut"></select>
      </div>
    </div>

    <div class="row" style="margin-top:.5rem">
      <button id="initAudio" class="btn btn-outline" type="button">Enable device list</button>
      <button id="testVocals" class="btn btn-outline" type="button">Test Vocals</button>
      <button id="testBand" class="btn btn-outline" type="button">Test Band</button>
      <span id="deviceMsg" class="help" style="margin-left:.5rem" aria-live="polite"></span>
    </div>
  </section>

  <!-- Playback -->
  <section class="card">
    <h2>Play</h2>
    <div class="row" style="margin-bottom:.5rem">
      <button id="play" class="btn btn-blue" type="button">Play</button>
      <button id="pause" class="btn btn-outline" type="button">Pause</button>
      <button id="restart" class="btn btn-outline" type="button">Restart</button>
    </div>

    <div class="row">
      <label for="offset">Vocals advance/Delay (ms):</label>
      <input id="offset" type="number" value="0" step="10" style="width:120px">
      <span class="help">Positive delays vocals; negative delays band.</span>
    </div>

    <div id="msg" class="error hide" role="alert"></div>

    <!-- Hidden players -->
    <audio id="vocalsEl" crossorigin="anonymous" preload="auto"></audio>
    <audio id="bandEl" crossorigin="anonymous" preload="auto"></audio>

    <!-- Hidden inputs for karaoke.js -->
    <input id="vocalsUrl" type="hidden">
    <input id="bandUrl"   type="hidden">
    <button id="loadBtn" type="button" style="display:none"></button>
    <span id="loadStatus" class="help" aria-live="polite"></span>
  </section>

  <!-- Lyrics -->
  <section class="card">
    <h2>Lyrics</h2>
    <div class="row">
      <button id="loadLyrics" class="btn btn-outline" type="button">Load lyrics</button>
      <label style="margin-left:.5rem">Artist:</label>
      <input id="lyrArtist" type="text" placeholder="optional" style="width:200px">
    </div>
    <pre id="lyricsBox" class="help" style="white-space:pre-wrap; max-height:260px; overflow:auto; margin-top:.5rem">—</pre>
  </section>

</main>

<div id="footer"></div>
<script src="https://www.krishposa.com/assets/js/footer.js"></script>

<!-- Tell karaoke.js we’re in player mode -->
<script>window.KARAOKE_MODE = "player";</script>
<script src="https://www.krishposa.com/assets/js/karaoke-common.js"></script>
<script src="https://www.krishposa.com/assets/js/karaoke-player.js"></script>
</body>
</html>
