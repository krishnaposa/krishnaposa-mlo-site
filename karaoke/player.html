<!doctype html>
<html lang="en">
<head>
  <!-- GTM -->
  <script>(function(w,d,s,l,i){w[l]=w[l]||[];w[l].push({'gtm.start':
  new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],
  j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src=
  'https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f);
  })(window,document,'script','dataLayer','GTM-KJZPQKBM');</script>

  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Karaoke Player – Route Vocals & Band</title>

  <!-- site styles -->
  <link rel="stylesheet" href="https://www.krishposa.com/assets/css/styles.css">
  <link rel="stylesheet" href="https://www.krishposa.com/assets/css/karaoke.css">

  <!-- Your list endpoint that returns SAS URLs:
       { items: [{ job_id, title?, updated?, vocals_url, band_url }, ... ] } -->
  <meta name="karaoke-list" content="https://karaoke-func-bthmcvafagcncmck.canadacentral-01.azurewebsites.net/api/list?code=">
</head>
<body>
<noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-KJZPQKBM" height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>

<div id="header"></div>
<script defer src="https://www.krishposa.com/assets/js/header.js?v=final1"></script>

<main class="container">

  <!-- Pick a completed song -->
  <section class="card">
    <h1>Karaoke Player</h1>
    <p class="help">Choose a processed song from storage. We’ll auto-load secure (SAS) links for vocals & band.</p>

    <div class="grid-2">
      <div class="field">
        <label for="songPick">Song</label>
        <select id="songPick">
          <option value="">Loading…</option>
        </select>
      </div>
      <div class="field">
        <label>&nbsp;</label>
        <button id="useSelection" class="btn btn-blue" type="button">Load selection</button>
      </div>
    </div>

    <div class="row" style="margin-top:.5rem">
      <button id="refreshList" class="btn btn-outline" type="button">Refresh list</button>
    </div>

    <div id="listStatus" class="help" aria-live="polite"></div>
  </section>

  <!-- Route outputs -->
  <section class="card">
    <h2>Route outputs</h2>
    <div class="grid-2">
      <div class="field">
        <label for="vocalsOut">Vocals output</label>
        <select id="vocalsOut"></select>
      </div>
      <div class="field">
        <label for="bandOut">Band output</label>
        <select id="bandOut"></select>
      </div>
    </div>

    <div class="row" style="margin-top:.5rem">
      <button id="initAudio" class="btn btn-outline" type="button">Enable device list</button>
      <button id="testVocals" class="btn btn-outline" type="button">Test Vocals</button>
      <button id="testBand" class="btn btn-outline" type="button">Test Band</button>
    </div>
  </section>

  <!-- Playback -->
  <section class="card">
    <h2>Play</h2>
    <div class="row" style="margin-bottom:.5rem">
      <button id="play" class="btn btn-blue" type="button">Play</button>
      <button id="pause" class="btn btn-outline" type="button">Pause</button>
      <button id="restart" class="btn btn-outline" type="button">Restart</button>
    </div>

    <div class="row">
      <label for="offset">Vocals advance/Delay (ms):</label>
      <input id="offset" type="number" value="0" step="10" style="width:120px">
      <span class="help">Positive delays vocals; negative delays band.</span>
    </div>

    <div id="msg" class="error hide" role="alert"></div>

    <!-- Hidden players -->
    <audio id="vocalsEl" crossorigin="anonymous" preload="auto"></audio>
    <audio id="bandEl" crossorigin="anonymous" preload="auto"></audio>

    <!-- Hidden inputs kept for karaoke.js (player mode) compatibility -->
    <input id="vocalsUrl" type="hidden">
    <input id="bandUrl"   type="hidden">
    <button id="loadBtn" type="button" style="display:none"></button>
    <span id="loadStatus" class="help" aria-live="polite"></span>
  </section>

</main>

<div id="footer"></div>
<script src="https://www.krishposa.com/assets/js/footer.js"></script>

<!-- Tell karaoke.js we’re in player mode BEFORE loading it -->
<script>window.KARAOKE_MODE = "player";</script>
<script src="https://www.krishposa.com/assets/js/karaoke.js"></script>

<!-- List → use SAS URLs → load -->
<script>
(function(){
  const LIST_URL = document.querySelector('meta[name="karaoke-list"]')?.content || '';

  const pick = document.getElementById('songPick');
  const useBtn = document.getElementById('useSelection');
  const refreshBtn = document.getElementById('refreshList');
  const status = document.getElementById('listStatus');

  const vocalsUrlIn = document.getElementById('vocalsUrl'); // hidden
  const bandUrlIn   = document.getElementById('bandUrl');   // hidden
  const loadBtn     = document.getElementById('loadBtn');   // hidden
  const loadStatus  = document.getElementById('loadStatus');

  function setListStatus(t){ status.textContent = t || ''; }

  async function loadList(){
    try {
      if (!LIST_URL) throw new Error('Missing karaoke-list URL meta.');
      setListStatus('Loading songs…');

      const res = await fetch(LIST_URL, { mode: 'cors' });
      if (!res.ok) throw new Error(`List failed (${res.status})`);
      const data = await res.json();

      const items = (data && data.items) || [];
      pick.innerHTML = '';
      if (!items.length) {
        pick.innerHTML = '<option value="">No completed songs yet</option>';
        setListStatus('');
        return;
      }

      // newest first if API includes timestamps
      items.sort((a,b) => (b.updated||'').localeCompare(a.updated||''));

      for (const it of items) {
        // store SAS links as JSON in option value, display friendly title
        const opt = document.createElement('option');
        opt.value = JSON.stringify({ vocals: it.vocals_url, band: it.band_url });
        opt.textContent = it.title || it.job_id;
        pick.appendChild(opt);
      }
      setListStatus(`Loaded ${items.length} song(s).`);
    } catch (e) {
      console.warn(e);
      setListStatus('Could not load list. ' + (e.message || e));
    }
  }

  useBtn.addEventListener('click', () => {
    const val = pick.value;
    if (!val) return;

    try {
      const sel = JSON.parse(val);
      // Feed SAS URLs into hidden inputs for karaoke.js (player mode)
      vocalsUrlIn.value = sel.vocals || '';
      bandUrlIn.value   = sel.band   || '';
      loadBtn.click(); // your existing loader in karaoke.js will pick these up
      loadStatus.textContent = 'Tracks loaded.';
    } catch (e) {
      console.warn('Invalid selection', e);
    }
  });

  refreshBtn.addEventListener('click', loadList);
  loadList();
})();
</script>
</body>
</html>
