<html lang="en">
<head>

  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Analyze an Investment Property | Krish Posa</title>
  <meta name="description" content="Submit a property to analyze expected rent, costs, appreciation, and ROI.">
  <link rel="icon" href="https://www.krishposa.com/assets/img/favicon.png" type="image/png">

  <!-- site styles -->
  <link rel="stylesheet" href="https://www.krishposa.com/assets/css/styles.css">
  <link rel="stylesheet" href="https://www.krishposa.com/assets/css/header-nav.css?v=final1">
  <link rel="stylesheet" href="https://www.krishposa.com/assets/css/cobrand.css?v=1">
  <link rel="stylesheet" href="/assets/css/invest-analyzer.css?v=1">

  <!-- site scripts -->
  <script defer src="https://www.krishposa.com/assets/js/script.js"></script>
  <script defer src="https://www.krishposa.com/assets/js/cobrand.js?v=1"></script>
  <script defer src="/assets/js/invest-analyzer.js"></script>
</head>
<body>
  <!-- GTM noscript -->
  <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-KJZPQKBM" height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>

  <div id="header"></div>
  <script defer src="https://www.krishposa.com/assets/js/header.js?v=final1"></script>

  <main>
    <section class="page-hero">
      <div class="container">
        <h2>Investment Property Analyzer</h2>
        <p>We’ll fetch rent &amp; price comps, estimate taxes/insurance/HOA, apply appreciation, and compute Cap Rate, Cash Flow, CoC, and 10-yr IRR.</p>
      </div>
    </section>

    <section class="content container narrow">
      <div class="card form-card">
        <form id="investForm">
          <h3>Property</h3>
          <label>Street Address
            <input name="address" required placeholder="123 Main St">
          </label>
          <div class="grid-3">
            <label>Unit (optional)
              <input name="unit" placeholder="Apt 2B">
            </label>
            <label>City
              <input name="city" required>
            </label>
            <label>State
              <input name="state" required maxlength="2" placeholder="GA">
            </label>
          </div>
          <div class="grid-2">
            <label>ZIP
              <input name="zip" required>
            </label>
            <label>Hold (years)
              <input name="holdYears" type="number" value="10" min="1" max="40">
            </label>
          </div>

          <h3>Assumptions</h3>
          <div class="grid-3">
            <label>Down Payment %
              <input name="dpPct" type="number" value="20" min="0" max="100">
            </label>
            <label>Rate %
              <input name="rate" type="number" step="0.01" value="6.75">
            </label>
            <label>Term (years)
              <input name="term" type="number" value="30" min="1" max="40">
            </label>
          </div>

          <div class="grid-3">
            <label>Vacancy %
              <input name="vacancyPct" type="number" value="5" min="0" max="50">
            </label>
            <label>Mgmt %
              <input name="mgmtPct" type="number" value="8" min="0" max="50">
            </label>
            <label>Rehab ($ one-time)
              <input name="rehab" type="number" value="0" min="0">
            </label>
          </div>

          <div class="grid-3">
            <label>HOA ($/mo)
              <input name="hoa" type="number" value="0" min="0">
            </label>
            <label>Insurance ($/mo)
              <input name="insurance" type="number" value="0" min="0">
            </label>
            <label>Taxes ($/mo)
              <input name="taxes" type="number" value="0" min="0">
            </label>
          </div>

          <p class="small">If any monthly cost is unknown, leave it 0 — we’ll estimate from public data/heuristics.</p>

          <div class="flex-row">
            <button type="submit" class="btn">Analyze</button>
            <span id="submitStatus" class="small"></span>
          </div>
        </form>
      </div>
    </section>
  </main>

  <div id="footer"></div>
  <script src="https://www.krishposa.com/assets/js/footer.js"></script>
</body>
</html>
